<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
<script src="firebase.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:white;display:flex;height:100vh}
#users{width:25%;background:#1a1a1a;overflow:auto;padding:10px}
#chatArea{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
.msg{background:#222;padding:8px;margin:5px;border-radius:8px}
.online{color:lime;font-size:12px}
</style>
</head>
<body>

<div id="users"></div>

<div id="chatArea">
<div id="messages"></div>

<div>
<input id="msgInput" placeholder="اكتب رسالة">
<input type="file" id="imgInput">
<button onclick="sendMessage()">إرسال</button>
</div>
</div>

<script>

let currentChat = "general";

auth.onAuthStateChanged(user=>{
if(user){
loadUsers();
setOnline(user.uid);
listenMessages();
}else{
const email=prompt("Email");
const pass=prompt("Password");
auth.signInWithEmailAndPassword(email,pass)
.catch(()=>auth.createUserWithEmailAndPassword(email,pass));
}
});

function setOnline(uid){
db.collection("users").doc(uid).set({
online:true,
email:auth.currentUser.email
});
}

function loadUsers(){
db.collection("users").onSnapshot(snap=>{
let html="<h3>المستخدمين</h3>";
snap.forEach(doc=>{
const u=doc.data();
html+=`<div onclick="openPrivate('${doc.id}')">
${u.email} ${u.online?'<span class="online">●</span>':''}
</div>`;
});
document.getElementById("users").innerHTML=html;
});
}

function openPrivate(uid){
currentChat = getChatId(auth.currentUser.uid,uid);
listenMessages();
}

function getChatId(a,b){
return a<b? a+"_"+b : b+"_"+a;
}

function sendMessage(){
const text=document.getElementById("msgInput").value;
const file=document.getElementById("imgInput").files[0];

if(file){
const ref=storage.ref("images/"+Date.now());
ref.put(file).then(s=>{
s.ref.getDownloadURL().then(url=>{
saveMessage("",url);
});
});
}else{
saveMessage(text,"");
}
}

function saveMessage(text,img){
db.collection("chats").doc(currentChat)
.collection("messages").add({
text:text,
img:img,
uid:auth.currentUser.uid,
email:auth.currentUser.email,
time:firebase.firestore.FieldValue.serverTimestamp()
});
document.getElementById("msgInput").value="";
}

function listenMessages(){
db.collection("chats").doc(currentChat)
.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
const m=doc.data();
html+=`<div class="msg">
<b>${m.email}</b>: ${m.text}
${m.img? `<br><img src="${m.img}" width="150">`:''}
</div>`;
});
document.getElementById("messages").innerHTML=html;
});
}

</script>
</body>
</html>
